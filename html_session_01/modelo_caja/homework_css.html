<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .caja-grande {
        box-sizing: border-box;
        width: 100%;
        height: 220px;
        border-left: 8px solid #1a5276;
        border-bottom: 3px solid #00bcd4;
        border-top: none;
        border-right: none;
        position: relative;
        }

        .caja-grande::before {
        content: '';
        position: absolute;
        top: 0px;
        left: 0;
        width: 100%;
        height: 6px;
        background: #c8a800;
        box-sizing: border-box;
        }

        .caja-grande::after {
        content: '';
        position: absolute;
        top: 16px;
        left: 0;
        width: 100%;
        height: 4px;
        background: #b8960a;
        box-sizing: border-box;
        }

        .caja-patron {
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: flex-end;
        position: absolute;
        top: 20px;
        right: -6px;
        height: calc(125% - 60px);
        width: 20px;
        padding: 10px 0;
        box-sizing: border-box;
        }

        .seg-css {
        box-sizing: border-box;
        width: 10px;
        height: 50px;
        background-color: #7b1fa2;
        margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="caja-grande">
  <div class="caja-patron">
    <div class="seg-css"></div>
    <div class="seg-css"></div>
    <div class="seg-css"></div>
    <div class="seg-css"></div>
  </div>
</div>
</body>
</html>
