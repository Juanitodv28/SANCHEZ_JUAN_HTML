<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Mundial 2026</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- MENU RESPONSIVO :)-->
    <div class="main-header">
        <div class="main-header__container">
            <div class="main-header__logo">
                Mis eventos
            </div>
            <button class="main-header__toggle" id="menu-toggle">
                <div class="main-header__bar"></div>
                <div class="main-header__bar"></div>
                <div class="main-header__bar"></div>
            </button>
            <nav class="main-nav" id="main-nav">
                <ul class="main-nav__list">
                    <li class="main-nav__item">
                        <a class="main-nav__link" href="#">
                            Configuracion
                        </a>
                    </li>
                    <li class="main-nav__item">
                        <a class="main-nav__link" href="#">
                            Buscar
                        </a>
                    </li>
                    <li class="main-nav__item">
                        <a class="main-nav__link" href="#">
                            Ayuda
                        </a>
                    </li>
                </ul>
            </nav>
         </div>
    </div>
 
<!-- CANDELARIO -->
    <div class="container">
        <div class="month">
            July 2026
        </div>
        <div class="days">
            <div class="day__item">Mon</div>
            <div class="day__item">Tue</div>
            <div class="day__item">Wed</div>
            <div class="day__item">Thu</div>
            <div class="day__item">Fri</div>
            <div class="day__item">Sat</div>
            <div class="day__item">Sun</div>
        </div>
        <div class="schedule">
            <div class="schedule__days" id="dia-1"><span class="day-number">1</span></div>
            <div class="schedule__days" id="dia-2"><span class="day-number">2</span></div>
            <div class="schedule__days" id="dia-3"><span class="day-number">3</span></div>
            <div class="schedule__days" id="dia-4"><span class="day-number">4</span></div>
            <div class="schedule__days" id="dia-5"><span class="day-number">5</span></div>
            <div class="schedule__days" id="dia-6"><span class="day-number">6</span></div>
            <div class="schedule__days" id="dia-7"><span class="day-number">7</span></div>
            <div class="schedule__days" id="dia-8"><span class="day-number">8</span></div>
            <div class="schedule__days" id="dia-9"><span class="day-number">9</span></div>
            <div class="schedule__days" id="dia-10"><span class="day-number">10</span></div>
            <div class="schedule__days" id="dia-11"><span class="day-number">11</span></div>
            <div class="schedule__days" id="dia-12"><span class="day-number">12</span></div>
            <div class="schedule__days" id="dia-13"><span class="day-number">13</span></div>
            <div class="schedule__days" id="dia-14"><span class="day-number">14</span></div>
            <div class="schedule__days" id="dia-15"><span class="day-number">15</span></div>
            <div class="schedule__days" id="dia-16"><span class="day-number">16</span></div>
            <div class="schedule__days" id="dia-17"><span class="day-number">17</span></div>
            <div class="schedule__days" id="dia-18"><span class="day-number">18</span></div>
            <div class="schedule__days" id="dia-19"><span class="day-number">19</span></div>
            <div class="schedule__days" id="dia-20"><span class="day-number">20</span></div>
            <div class="schedule__days" id="dia-21"><span class="day-number">21</span></div>
            <div class="schedule__days" id="dia-22"><span class="day-number">22</span></div>
            <div class="schedule__days" id="dia-23"><span class="day-number">23</span></div>
            <div class="schedule__days" id="dia-24"><span class="day-number">24</span></div>
            <div class="schedule__days" id="dia-25"><span class="day-number">25</span></div>
            <div class="schedule__days" id="dia-26"><span class="day-number">26</span></div>
            <div class="schedule__days" id="dia-27"><span class="day-number">27</span></div>
            <div class="schedule__days" id="dia-28"><span class="day-number">28</span></div>
            <div class="schedule__days" id="dia-29"><span class="day-number">29</span></div>
            <div class="schedule__days" id="dia-30"><span class="day-number">30</span></div>
            <div class="schedule__days" id="dia-31"><span class="day-number">31</span></div>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="cerrarModalFondo(event)">
        <div class="modal">
            <div class="modal__top">
                <span class="modal__sub">Detalle del partido</span>
                <button class="modal__close" onclick="cerrarModal()">&times;</button>
            </div>
            <div class="modal__row">
                <span class="modal__icon" id="modalIcono"></span>
                <div>
                    <p class="modal__titulo" id="modalNombre"></p>
                    <span class="modal__sub" id="modalDia"></span>
                </div>
            </div>
            <div class="modal__row">🕐 <span id="modalHora"></span></div>
            <div class="modal__row">📝 <span id="modalDesc"></span></div>
        </div>
    </div>
    <script>
        const menuToggle = document.getElementById("menu-toggle")
        const mainNav = document.getElementById("main-nav")

        menuToggle.addEventListener('click' , function(){
            mainNav.classList.toggle('main-nav__open')
        })
        const eventos = [
            { dia: 4,  nombre: "Colombia vs Brasil",     hora: "3:00pm",  desc: "Octavos de final. ¡A asegurar el pase a cuartos!", icono: "⚽" },
            { dia: 5,  nombre: "Argentina vs Francia",   hora: "7:00pm",  desc: "Octavos de final. Revancha de la final pasada.", icono: "⚽" },
            { dia: 9,  nombre: "Cuartos de Final 1",     hora: "2:00pm",  desc: "Primer partido de cuartos de final.", icono: "🏟️" },
            { dia: 10, nombre: "Cuartos de Final 2",     hora: "6:00pm",  desc: "Segundo partido de cuartos de final.", icono: "🏟️" },
            { dia: 14, nombre: "Semifinal 1",            hora: "7:00pm",  desc: "Definiendo al primer finalista del mundial.", icono: "🔥" },
            { dia: 15, nombre: "Semifinal 2",            hora: "7:00pm",  desc: "Buscando el último cupo para la gran final.", icono: "🔥" },
            { dia: 18, nombre: "Tercer Puesto",          hora: "3:00pm",  desc: "Partido por el honor y el podio mundialista.", icono: "🥉" },
            { dia: 19, nombre: "La Gran Final",          hora: "2:00pm",  desc: "El partido decisivo por la Copa del Mundo.", icono: "🏆" }
        ]
 
        function pintarEventos(){
            eventos.forEach((ev, index) => {
                const celda = document.getElementById("dia-" + ev.dia)
                if(!celda) return
 
                const tarjeta = document.createElement("div")
                tarjeta.className = "event-card"
                tarjeta.innerHTML = `
                    <div class="event-card__nombre">${ev.icono} ${ev.nombre}</div>
                    <div class="event-card__hora">${ev.hora}</div>
                `
                tarjeta.addEventListener('click', () => abrirModal(index))
                celda.appendChild(tarjeta)
            })
        }
 
        function abrirModal(index){
            const ev = eventos[index]
            document.getElementById("modalIcono").textContent = ev.icono
            document.getElementById("modalNombre").textContent = ev.nombre
            // Cambiamos el texto de Junio a Julio
            document.getElementById("modalDia").textContent = "July " + ev.dia
            document.getElementById("modalHora").textContent = ev.hora
            document.getElementById("modalDesc").textContent = ev.desc
            document.getElementById("overlay").classList.add("overlay--show")
        }
 
        function cerrarModal(){
            document.getElementById("overlay").classList.remove("overlay--show")
        }
 
        function cerrarModalFondo(e){
            if(e.target.id === "overlay") cerrarModal()
        }
 
        pintarEventos()
    </script>
</body>
</html>
